<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Train Ops - IDEAL ARCH v2</title>

  <!-- 1) Nejdříve načteme styl mapy -->
  <link rel="stylesheet" href="https://unpkg.com"/>
  <link rel="stylesheet" href="style.css">

  <!-- 2) TADY JE TA ZMĚNA: Načteme samotnou mapu dříve než logiku hry -->
  <script src="https://unpkg.com"></script>
  
  <!-- 3) Načteme data o vlacích a trasách -->
  <script src="data.js"></script>

  <!-- Mobilní konzole pro jistotu (můžeš smazat, až to poběží) -->
  <script src="https://jsdelivr.net"></script>
  <script>eruda.init();</script>
</head>
<body>

  <div id="map"></div>

  <div id="ui">
    <div id="top">
      💰 <span id="money">0</span> Kč | 🚉 Plzeň hl.n. | Koleje: 2
    </div>
    <div id="content">
      <div id="queue"></div>
      <div id="detail">
        <h3 id="name">Vyber vlak</h3>
        <p id="state">---</p>
        <img id="img" style="display:none;"/>
        <div class="bar"><div id="p1" class="fill"></div></div>
        <div class="bar"><div id="p2" class="fill"></div></div>
        <div class="bar"><div id="p3" class="fill"></div></div>
        <div id="actions"></div>
      </div>
    </div>
  </div>

  <!-- 4) Nakonec spustíme samotnou hru, až když je vše nahoře připravené -->
  <script src="game.js"></script>
</body>
</html>
